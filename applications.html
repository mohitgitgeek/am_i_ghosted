<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application History - Ghosting Checker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 py-8">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold">Application History</h1>
            <a href="check_ghosting.html" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
                New Check
            </a>
        </div>

        <div id="message" class="hidden bg-blue-100 border-blue-500 text-blue-700 px-4 py-3 rounded mb-4" role="alert"></div>

        <div class="bg-white shadow-md rounded px-8 pt-6 pb-8 mb-4">
            <div class="overflow-x-auto">
                <table class="min-w-full table-auto">
                    <thead>
                        <tr class="bg-gray-100">
                            <th class="px-4 py-2 text-left">Company</th>
                            <th class="px-4 py-2 text-left">Location</th>
                            <th class="px-4 py-2 text-left">Application Date</th>
                            <th class="px-4 py-2 text-left">Last Contact</th>
                            <th class="px-4 py-2 text-left">Status</th>
                            <th class="px-4 py-2 text-left">Notes</th>
                            <th class="px-4 py-2 text-left">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="applications-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const storageKey = 'ghostedApplications';
        const tableBody = document.getElementById('applications-body');
        const messageBox = document.getElementById('message');

        const getApplications = () => {
            try {
                return JSON.parse(localStorage.getItem(storageKey)) || [];
            } catch (error) {
                return [];
            }
        };

        const saveApplications = (applications) => {
            localStorage.setItem(storageKey, JSON.stringify(applications));
        };

        const statusClasses = (status) => {
            if (status === 'Likely ghosted') return 'bg-red-200 text-red-800';
            if (status === 'Follow up recommended') return 'bg-yellow-200 text-yellow-800';
            return 'bg-green-200 text-green-800';
        };

        const renderApplications = () => {
            const applications = getApplications().sort((a, b) => b.application_date.localeCompare(a.application_date));
            tableBody.innerHTML = '';

            if (applications.length === 0) {
                const row = document.createElement('tr');
                row.className = 'border-t';

                const cell = document.createElement('td');
                cell.colSpan = 7;
                cell.className = 'px-4 py-4 text-center text-gray-500';
                cell.textContent = 'No applications yet. Start by adding one.';
                row.appendChild(cell);
                tableBody.appendChild(row);
                return;
            }

            applications.forEach((app) => {
                const row = document.createElement('tr');
                row.className = 'border-t';

                const fields = [
                    app.company_name,
                    app.location,
                    app.application_date,
                    app.last_contact_date || 'N/A'
                ];

                fields.forEach((value) => {
                    const cell = document.createElement('td');
                    cell.className = 'px-4 py-2';
                    cell.textContent = value;
                    row.appendChild(cell);
                });

                const statusCell = document.createElement('td');
                statusCell.className = 'px-4 py-2';
                const badge = document.createElement('span');
                badge.className = `px-2 py-1 rounded text-sm ${statusClasses(app.status)}`;
                badge.textContent = app.status;
                statusCell.appendChild(badge);
                row.appendChild(statusCell);

                const notesCell = document.createElement('td');
                notesCell.className = 'px-4 py-2';
                notesCell.textContent = app.notes;
                row.appendChild(notesCell);

                const actionCell = document.createElement('td');
                actionCell.className = 'px-4 py-2';
                const deleteButton = document.createElement('button');
                deleteButton.type = 'button';
                deleteButton.className = 'bg-red-500 hover:bg-red-700 text-white font-bold py-1 px-3 rounded text-sm';
                deleteButton.textContent = 'Delete';
                deleteButton.addEventListener('click', () => {
                    const updated = getApplications().filter((item) => item.id !== app.id);
                    saveApplications(updated);
                    renderApplications();
                });
                actionCell.appendChild(deleteButton);
                row.appendChild(actionCell);

                tableBody.appendChild(row);
            });
        };

        const params = new URLSearchParams(window.location.search);
        const message = params.get('message');
        if (message) {
            messageBox.textContent = message;
            messageBox.classList.remove('hidden');
        }

        renderApplications();
    </script>
</body>
</html>
