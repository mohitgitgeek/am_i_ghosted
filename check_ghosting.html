<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghosted Checker</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold mb-8">Company Ghosting Checker</h1>

        <div id="message" class="hidden bg-blue-100 border-blue-500 text-blue-700 px-4 py-3 rounded mb-4" role="alert"></div>

        <form id="ghosting-form" class="bg-white shadow-md rounded px-8 pt-6 pb-8 mb-4">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="company_name">
                    Company Name
                </label>
                <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
                       id="company_name" name="company_name" type="text" required>
            </div>
            
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="location">
                    Location
                </label>
                <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
                       id="location" name="location" type="text" required>
            </div>
            
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="application_date">
                    Application Date
                </label>
                <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
                       id="application_date" name="application_date" type="date" required>
            </div>
            
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="last_contact_date">
                    Last Contact Date (if any)
                </label>
                <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
                       id="last_contact_date" name="last_contact_date" type="date">
            </div>
            
            <div class="flex items-center justify-between">
                <button class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline"
                        type="submit">
                    Check Status
                </button>
                <a href="applications.html"
                   class="text-blue-500 hover:text-blue-800">
                    View All Applications
                </a>
            </div>
        </form>
    </div>

    <script>
        const storageKey = 'ghostedApplications';
        const form = document.getElementById('ghosting-form');
        const messageBox = document.getElementById('message');

        const showMessage = (message) => {
            messageBox.textContent = message;
            messageBox.classList.remove('hidden');
        };

        const getApplications = () => {
            try {
                return JSON.parse(localStorage.getItem(storageKey)) || [];
            } catch (error) {
                console.error('Failed to parse applications from localStorage:', error);
                return [];
            }
        };

        const toUtcDate = (dateString) => {
            if (!/^\d{4}-\d{2}-\d{2}$/.test(dateString)) return null;
            const [year, month, day] = dateString.split('-').map(Number);
            const utcTime = Date.UTC(year, month - 1, day);
            return Number.isNaN(utcTime) ? null : utcTime;
        };

        form.addEventListener('submit', (event) => {
            event.preventDefault();

            const companyName = document.getElementById('company_name').value.trim();
            const location = document.getElementById('location').value.trim();
            const applicationDate = document.getElementById('application_date').value;
            const lastContactDate = document.getElementById('last_contact_date').value;

            if (!companyName || !location || !applicationDate) {
                showMessage('Please fill in all required fields.');
                return;
            }

            const startDate = lastContactDate || applicationDate;
            const today = new Date();
            const todayUtc = Date.UTC(today.getUTCFullYear(), today.getUTCMonth(), today.getUTCDate());
            const startUtc = toUtcDate(startDate);
            if (startUtc === null || startUtc > todayUtc) {
                showMessage('Please enter a valid date that is not in the future.');
                return;
            }
            const daysSinceContact = Math.floor((todayUtc - startUtc) / (1000 * 60 * 60 * 24));

            let status = 'Active';
            let notes = 'Application is still active. Keep waiting.';

            if (daysSinceContact > 14) {
                status = 'Likely ghosted';
                notes = `It's been ${daysSinceContact} days since last contact. You may have been ghosted.`;
            } else if (daysSinceContact > 7) {
                status = 'Follow up recommended';
                notes = 'Consider sending a follow-up email.';
            }

            const applications = getApplications();
            applications.push({
                id: Date.now(),
                company_name: companyName,
                location,
                application_date: applicationDate,
                last_contact_date: lastContactDate || null,
                status,
                notes
            });

            localStorage.setItem(storageKey, JSON.stringify(applications));
            sessionStorage.setItem('ghostedMessage', notes);
            window.location.href = 'applications.html';
        });
    </script>
</body>
</html>
