<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghosted Checker</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
    <main style="max-width: 640px; margin: 80px auto; padding: 0 16px;">
        <h1>Ghosted Checker</h1>
        <p id="redirect-message" aria-live="polite">
            Redirecting to the app in 3 seconds...
        </p>
        <p>
            If you are not redirected, <a href="check_ghosting.html">open the app</a>.
        </p>
    </main>

    <script>
        setTimeout(() => {
            document.getElementById('redirect-message').textContent = 'Redirecting now...';
            window.location.href = 'check_ghosting.html';
        }, 3000);
    </script>
</body>
</html>
